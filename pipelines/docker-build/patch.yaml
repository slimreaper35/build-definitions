---
- op: add
  path: /spec/description
  value: |
    This pipeline is ideal for building container images from a Containerfile while reducing network traffic.

    _Uses `buildah` to create a container image. It also optionally creates a source image and runs some build-time tests. EC will flag a violation for [`trusted_task.trusted`](https://conforma.dev/docs/policy/packages/release_trusted_task.html#trusted_task__trusted) if any tasks are added to the pipeline.
    This pipeline is pushed as a Tekton bundle to [quay.io](https://quay.io/repository/konflux-ci/tekton-catalog/pipeline-docker-build?tab=tags)_
- op: replace
  path: /metadata/name
  value: docker-build
- op: replace
  path: /metadata/labels
  value:
    "pipelines.openshift.io/used-by": "build-cloud"
    "pipelines.openshift.io/runtime": "generic"
    "pipelines.openshift.io/strategy": "docker"
#  yq ".spec.tasks.[].name" pipelines/template-build/template-build.yaml | nl -v 0
#      0  init
#      1  clone-repository
#      2  prefetch-dependencies
#      3  build-container
#      4  build-image-index
#      5  build-source-image
#      6  deprecated-base-image-check
#      7  clair-scan
#      8  ecosystem-cert-preflight-checks
#      9  sast-snyk-check
#     10  clamav-scan
#     11  sast-shell-check
#     12  sast-unicode-check
#     13  apply-tags
#     14  push-dockerfile
#     15  rpms-signature-scan

# build-container
- op: test
  path: /spec/tasks/3/name
  value: build-container
- op: replace
  path: /spec/tasks/3/taskRef
  value:
    name: buildah
    version: "0.10"
- op: add
  path: /spec/params/-
  value:
    name: build-args
    description: Array of --build-arg values ("arg=value" strings) for buildah
    type: array
    default: []
- op: add
  path: /spec/params/-
  value:
    name: build-args-file
    description: Path to a file with build arguments for buildah, see https://www.mankier.com/1/buildah-build#--build-arg-file
    type: string
    default: ""
- op: add
  path: /spec/params/-
  value:
    name: privileged-nested
    description: Whether to enable privileged mode, should be used only with remote VMs
    type: string
    default: "false"
- op: add
  path: /spec/params/-
  value:
    name: source-date-epoch
    description: Sets the image created time and the SOURCE_DATE_EPOCH build argument. On its own, it does not change file timestamps inside the layers (set rewrite-timestamp to "true" for that). Leave empty to keep the actual build time.
    type: string
    default: ""
- op: add
  path: /spec/params/-
  value:
    name: rewrite-timestamp
    description: When "true", clamp file modification times in the image layers to at most source-date-epoch. Does nothing unless source-date-epoch is set.
    type: string
    default: "false"
- op: add
  path: /spec/params/-
  value:
    name: omit-history
    description: When "true", omit the build history (history timestamps, layer metadata, etc.) from the resulting image.
    type: string
    default: "false"
- op: add
  path: /spec/tasks/3/params
  value:
  - name: IMAGE
    value: $(params.output-image)
  - name: DOCKERFILE
    value: $(params.dockerfile)
  - name: CONTEXT
    value: $(params.path-context)
  - name: HERMETIC
    value: "$(params.hermetic)"
  - name: PREFETCH_INPUT
    value: "$(params.prefetch-input)"
  - name: IMAGE_EXPIRES_AFTER
    value: "$(params.image-expires-after)"
  - name: COMMIT_SHA
    value: "$(tasks.clone-repository.results.commit)"
  - name: BUILD_ARGS
    value:
      - $(params.build-args[*])
  - name: BUILD_ARGS_FILE
    value: "$(params.build-args-file)"
  - name: PRIVILEGED_NESTED
    value: "$(params.privileged-nested)"
  - name: SOURCE_URL
    value: "$(tasks.clone-repository.results.url)"
  - name: BUILDAH_FORMAT
    value: "$(params.buildah-format)"
  - name: HTTP_PROXY
    value: "$(tasks.init.results.http-proxy)"
  - name: NO_PROXY
    value: "$(tasks.init.results.no-proxy)"
  - name: SOURCE_DATE_EPOCH
    value: "$(params.source-date-epoch)"
  - name: REWRITE_TIMESTAMP
    value: "$(params.rewrite-timestamp)"
  - name: OMIT_HISTORY
    value: "$(params.omit-history)"
